<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      background: #222;
    }
    /* image는 원래 표현하려는 크기의 2배로 만들어서 css에서 줄여줌 */
    /* 300px 이미지는 여기에서 150px로 표현해서 고해상도 */

    @keyframes spaceship-ani {
      /* 시작점이 똑같을 때는 굳이 쓰지 않아도 됨 */
      /* 100% 대신 to라고 써도 됨, 0%는 from이라고 해도 됨. */
      to {
        /* 5100의 절반인 2550만큼만 움직이면 됨 */
        background-position : -2550px 0;
      }
    }
    .spaceship {
      width: 150px;
      height: 150px;
      /* 이미지 5100 X 300px */
      /* 쉽게 계산되는 거 하나 반으로 줄여주고 나머지는 auto로 하면 쉬움 */
      background: url('images/sprite_spaceship.png') no-repeat 0 0 / auto 150px;
      /* 5100 / 300 = 17 -> 17단계 */
      animation: spaceship-ani 2s infinite reverse steps(17);
    }

    /* gif로 하면 안되나요? */
    /* 치명적인 단점 -> 투명도가 적용이 안 됨. */
    /* 픽셀 아트가 아닌 이상 가장자리에 anti-aliasing으로 부드럽게 처리한 부분이 깨진 것처럼 보임 */
    /* 배경이 어두우면 하얀색이 찌글찌글하게 남는다. */
    /* 그리고 gif 대신 animation으로 하면 움직임을 코드로 제어할 수 있음 */
  </style>
</head>
<body>
  <!-- 
  셀 애니메이션(Frame by Frame) : 노가다 방식 애니메이션
  => image sprite를 써야 함. 
  -->
  <div class="spaceship"></div>
</body>
</html>
