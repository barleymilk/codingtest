<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="./fx.js"></script>
</head>
<body>
  <script>
    const add = (a, b) => a + b;

    const range = l => {
      let i = -1;
      let res = [];
      while(++i < l) {
        res.push(i);
      }
      return res;
    };

    const L = {};
    L.range = function *(l) {
      let i = -1;
      while(++i < l) {
        yield i;
      }
    };
  </script>

  <script>
    function test(name, time, f) {
      console.time(name);
      while (time--) f();
      console.timeEnd(name);
    }

    test('range', 1, () => reduce(add, range(10))); // range: 0.113037109375 ms
    test('L.range', 1, () => reduce(add, L.range(10))); // L.range: 0.037109375 ms
    console.clear();
  </script>

  <script>
    // 많은 값을 받아서 잘라주는 함수
    // const take = (l, iter) => {
    //   let res = [];
    //   for (const a of iter) {
    //     res.push(a);
    //     if (res.length == l) return res;
    //   }
    //   return res;
    // }

    const take = curry((l, iter) => {
      let res = [];
      for (const a of iter) {
        res.push(a);
        if (res.length == l) return res;
      }
      return res;
    });

    console.time('');
    go(
      range(10000),
      take(5),
      reduce(add), // 10
      log
    )
    console.timeEnd(''); // 0.1689453125 ms

    console.time('');
    go(
      L.range(10000),
      take(5),
      reduce(add), // 10
      log
    )
    console.timeEnd(''); // 0.01513671875 ms

    console.time('');
    log(take(5, range(10000))); // [0, 1, 2, 3, 4]
    console.timeEnd(''); // 0.156982421875 ms

    // 100만큼의 array를 만들지 않고 5개의 값만 만들기 때문에 효율적임
    console.time('');
    log(take(5, L.range(10000))); // [0, 1, 2, 3, 4]
    // log(take(5, L.range(Infinity))); // L.range에서는 Infinity도 가능
    console.timeEnd(''); // 0.037841796875 ms


  </script>
</body>
</html>
