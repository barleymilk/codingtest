<body>
  <script>
    const add = (a, b) => a + b;

    const range = l => {
      let i = -1;
      let res = [];
      while(++i < l) {
        log(i, 'range');
        res.push(i);
      }
      return res;
    };

    // log(range(5));
    // [0, 1, 2, 3, 4]
    
    // log(range(2));
    // [0, 1]

    var list = range(4);
    log(list); // [0, 1, 2, 3]
    // log(reduce(add, list)); // 0 + 1 + 2 + 3 = 6
    // 6
  </script>

  # 느긋한 L.range
  - next()를 하기 전까지는 L.range는 log가 안 찍힌다.
  <script>
    const L = {};
    L.range = function *(l) {
      let i = -1;
      while(++i < l) {
        log(i, 'L.range');
        yield i;
      }
    };

    var list = L.range(4);
    log(list); // L.range {<suspended>}
    log(list.next());
    log(list.next());
    log(list.next());
    log(list.next());
    // log(reduce(add, list)); // 6
  </script>
</body>
