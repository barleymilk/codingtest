<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="./fx.js"></script>
</head>
<body>
  <script>
    const add = (a, b) => a + b;

    const range = l => {
      let i = -1;
      let res = [];
      while(++i < l) {
        res.push(i);
      }
      return res;
    };

    const L = {};
    L.range = function *(l) {
      let i = -1;
      while(++i < l) {
        yield i;
      }
    };
  </script>

  <script>
    function test(name, time, f) {
      console.time(name);
      while (time--) f();
      console.timeEnd(name);
    }

    test('range', 1, () => reduce(add, range(10))); // range: 0.113037109375 ms
    test('L.range', 1, () => reduce(add, L.range(10))); // L.range: 0.037109375 ms
  </script>
</body>
</html>
