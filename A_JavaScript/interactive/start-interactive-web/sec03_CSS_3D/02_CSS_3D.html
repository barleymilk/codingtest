<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .world {
      width: 80vw;
      height: 80vh;
      background-color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;

      perspective: 500px;
    }
    .card {
      position: relative;

      width: 100px;
      height: 150px;
      margin: 1em;
      
      transform: rotateY(0deg);
      transition: 1s;

      /* world의 3D 효과가 card에도 적용되게 */
      transform-style: preserve-3d;
    }
    .card-side {
      display: flex;
      align-items: center;
      justify-content: center;

      position: absolute;
      top: 0;
      left: 0;

      width: 100%;
      height: 100%;

      border-radius: 0.5em;
      font-size: 1.5rem;

      /* 추가 */
      -webkit-backface-visibility: hidden; /* safari 적용 */
      -moz-backface-visibility: hidden; /* mozilla - firefox 적용 */
      -o-backface-visibility: hidden; /* opera 적용 */
      backface-visibility: hidden; /* 항상 마지막에 표준 스타일을 적기 */
      /* transform-origin: left; */
    }
    .card-side-front {
      z-index: 1;
      background-color: white;
    }
    .card-side-back {
      background-color: grey;
      transform: rotateY(180deg);
    }
    .world:hover .card {
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
    <div class="world">
      <div class="card">
        <div class="card-side card-side-front">F</div>
        <div class="card-side card-side-back">B</div>
      </div>
    </div>
</body>
</html>
