<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .world {
      width: 80vw;
      height: 80vh;
      background-color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;

      perspective: 500px;
    }
    .card-side {
      display: flex;
      align-items: center;
      justify-content: center;

      position: absolute;
      top: 50%;
      left: 50%;

      width: 100px;
      height: 150px;
      margin: -75px 0 0 -50px;

      border-radius: 0.5em;
      font-size: 1.5rem;

      -webkit-backface-visibility: hidden; /* safari 적용 */
      -moz-backface-visibility: hidden; /* mozilla - firefox 적용 */
      -o-backface-visibility: hidden; /* opera 적용 */
      backface-visibility: hidden;
      
      transition: 1s;
    }
    .card-side-front {
      z-index: 1;
      background-color: white;
    }
    .card-side-back {
      background-color: grey;
      transform: rotateY(180deg);
    }
    .world:hover .card-side-front {
      transform: rotateY(180deg);
    }
    .world:hover .card-side-back {
      transform: rotateY(360deg);
    }
  </style>
</head>

<body>
    <div class="world">
      <!-- internet explorer -> preserve-3d가 없음 -> card를 없앰 -->
      <!-- <div class="card"> -->
      <div class="card-side card-side-front">F</div>
      <div class="card-side card-side-back">B</div>
      <!-- </div> -->
    </div>
</body>
</html>
