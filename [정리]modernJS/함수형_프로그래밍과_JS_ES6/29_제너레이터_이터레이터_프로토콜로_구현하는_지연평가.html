  # 이터러블 중심 프로그래밍에서의 지연 평가 (Lazy Evaluation) 
  - 제때 계산법
  - 느긋한 계산법
  - 제너레이터/이터레이트 프로토콜을 기반으로 구현

  <script>
    const L = {};

    // L.map
    // 평가를 미루는 성질을 가지고 평가 순서를 달리 조작할 수 있는 준비가 되어있는 이터레이터를 반환하는 제너레이터 함수
    L.map = function *(iter) {
      for (const a of iter) yield a;
    }
    var it = L.map([1, 2, 3]);
    log(it.next()); // {value: 1, done: false}
    log(it.next()); // {value: 2, done: false}
    log(it.next()); // {value: 3, done: false}
    log(it.next()); // {value: undefined, done: true}


    L.map = function *(f, iter) {
      for (const a of iter) yield f(a);
    }
    var it = L.map(a => a + 10, [1, 2, 3]);
    // log([...it]); // [11,12,13]
    log(it.next()); // {value: 11, done: false}
    log(it.next()); // {value: 12, done: false}
    log(it.next()); // {value: 13, done: false}
    log(it.next()); // {value: undefined, done: true}
    log([...it]); // []


    // L.filter
    L.filter = function *(f, iter) {
      for (const a of iter) if (f(a)) yield a;
    }
    var it = L.filter(a => a % 2, [1, 2, 3, 4]); // 홀수인 것만 필터링
    // log([...it]) // [1, 3]
    log(it.next()); // {value: 1, done: false}
    log(it.next()); // {value: 3, done: false}
    log(it.next()); // {value: undefined, done: true}


  </script>
  
  ### map, filter 계열 함수들이 가지는 결합 법칙
  - 사용하는 데이터가 무엇이든지
  - 사용하는 보조 함수가 순수 함수라면 무엇이든지
  - 아래와 같이 결합한다면 둘 다 결과가 같다.
